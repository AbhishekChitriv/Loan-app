<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LendSmart AI - Predictive Financial Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --perspective: 1200px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f0f2f5;
            overflow-x: hidden;
        }

        .perspective-container {
            perspective: var(--perspective);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            transform-style: preserve-3d;
            transition: transform 0.5s cubic-bezier(0.23, 1, 0.32, 1), box-shadow 0.5s ease;
        }

        .tilt-card:hover {
            transform: rotateX(4deg) rotateY(-4deg) translateY(-8px) scale(1.02);
            box-shadow: 0 25px 50px -12px rgba(99, 102, 241, 0.25);
        }

        .tilt-card-inverse:hover {
            transform: rotateX(-4deg) rotateY(4deg) translateY(-8px) scale(1.02);
            box-shadow: 0 25px 50px -12px rgba(99, 102, 241, 0.25);
        }

        .inner-3d {
            transform: translateZ(30px);
        }

        .floating {
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0% {
                transform: translateY(0px) rotate(0deg);
            }

            50% {
                transform: translateY(-20px) rotate(2deg);
            }

            100% {
                transform: translateY(0px) rotate(0deg);
            }
        }

        .bg-mesh {
            background-color: #f8fafc;
            background-image:
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0, transparent 50%),
                radial-gradient(at 50% 0%, rgba(59, 130, 246, 0.1) 0, transparent 50%),
                radial-gradient(at 100% 0%, rgba(139, 92, 246, 0.15) 0, transparent 50%);
        }

        .shimmer {
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
            background-size: 200% 100%;
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% {
                background-position: -200% 0;
            }

            100% {
                background-position: 200% 0;
            }
        }
    </style>
    <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@19.2.3",
    "react-dom": "https://esm.sh/react-dom@19.2.3",
    "react-dom/client": "https://esm.sh/react-dom@19.2.3/client"
  }
}
</script>
</head>

<body class="bg-mesh min-h-screen">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';

        function App() {
            const [view, setView] = useState('loading'); // loading, main, login, signup, verify
            const [user, setUser] = useState(null);
            const [authEmail, setAuthEmail] = useState(''); // Store email for OTP verification
            const [formData, setFormData] = useState({
                age: '',
                gender: 'Male',
                education: 'Graduate',
                self_employed: 'No',
                salaried: 'Yes',
                income: '',
                cibil_score: 650
            });
            const [loading, setLoading] = useState(false);
            const [result, setResult] = useState(null);
            const [authForm, setAuthForm] = useState({
                firstName: '',
                lastName: '',
                mobile: '',
                email: '',
                password: ''
            });
            const [otp, setOtp] = useState('');
            const [showOTPModal, setShowOTPModal] = useState(false);

            useEffect(() => {
                checkSession();
            }, []);

            const checkSession = async () => {
                try {
                    const res = await fetch('/check_session');
                    const data = await res.json();
                    if (data.logged_in) {
                        setUser(data.email);
                        setView('main');
                    } else {
                        setView('login');
                    }
                } catch (err) {
                    setView('login');
                }
            };

            const triggerOTP = async () => {
                if (!authForm.email) {
                    alert("Please enter your email first");
                    return;
                }
                setLoading(true);
                try {
                    const res = await fetch('/send_otp', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email: authForm.email })
                    });
                    const data = await res.json();
                    alert(data.message);
                    if (data.success) {
                        setAuthEmail(authForm.email);
                        setShowOTPModal(true);
                    }
                } catch (err) {
                    alert("Failed to send OTP");
                } finally {
                    setLoading(false);
                }
            };

            const handleAuth = async (e, type) => {
                e.preventDefault();
                setLoading(true);
                try {
                    const endpoint = type === 'login' ? '/login' : '/signup';
                    const res = await fetch(endpoint, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(authForm)
                    });
                    const data = await res.json();
                    if (data.success) {
                        if (type === 'signup') {
                            alert(data.message);
                            setAuthEmail(authForm.email);
                            setShowOTPModal(true);
                        } else if (data.needs_verification) {
                            alert(data.message);
                            setAuthEmail(authForm.email);
                            setShowOTPModal(true);
                        } else {
                            setUser(authForm.email);
                            setView('main');
                        }
                    } else {
                        alert(data.message);
                    }
                } catch (err) {
                    alert("Authentication failed");
                } finally {
                    setLoading(false);
                }
            };

            const handleVerify = async (e) => {
                e.preventDefault();
                setLoading(true);
                try {
                    const res = await fetch('/verify_otp', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email: authEmail, otp })
                    });
                    const data = await res.json();
                    if (data.success) {
                        setShowOTPModal(false);
                        setUser(authEmail);
                        setView('main');
                    } else {
                        alert(data.message);
                    }
                } catch (err) {
                    alert("Verification failed");
                } finally {
                    setLoading(false);
                }
            };

            const handleLogout = async () => {
                await fetch('/logout');
                setUser(null);
                setView('login');
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                setLoading(true);
                try {
                    const response = await fetch('/predict', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(formData)
                    });
                    const data = await response.json();
                    if (data.success) {
                        setResult(data.prediction);
                    } else {
                        alert("Error: " + data.error);
                    }
                } catch (err) {
                    alert("Failed to connect to server");
                } finally {
                    setLoading(false);
                }
            };

            const formatCurrency = (val) => {
                return new Intl.NumberFormat('en-IN', {
                    style: 'currency',
                    currency: 'INR',
                    maximumFractionDigits: 0
                }).format(val);
            };

            if (view === 'loading') return <div className="min-h-screen flex items-center justify-center text-indigo-600 font-bold">Initializing System...</div>;

            return (
                <div className="min-h-screen bg-slate-50">
                    {view === 'login' && (
                        <div className="max-w-md mx-auto pt-20 pb-10 px-4">
                            <div className="glass-card rounded-3xl p-8 shadow-2xl">
                                <div className="text-center mb-8">
                                    <div className="w-16 h-16 bg-indigo-600 rounded-2xl flex items-center justify-center shadow-lg shadow-indigo-200 mx-auto mb-4">
                                        <span className="text-3xl">🔑</span>
                                    </div>
                                    <h2 className="text-3xl font-bold text-slate-900">Welcome Back</h2>
                                    <p className="text-slate-500 mt-2 font-medium">LendSmart AI Predictive Engine</p>
                                </div>
                                <form onSubmit={(e) => handleAuth(e, 'login')} className="space-y-4">
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Email Address</label>
                                        <input
                                            type="email"
                                            className="w-full bg-white/50 border border-slate-200 rounded-xl p-3 text-sm focus:ring-2 focus:ring-indigo-500 transition-all outline-none"
                                            placeholder="name@example.com"
                                            value={authForm.email}
                                            onChange={e => setAuthForm({ ...authForm, email: e.target.value })}
                                            required
                                        />
                                    </div>
                                    <div className="space-y-1">
                                        <div className="flex justify-between items-center">
                                            <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Password</label>
                                            <button type="button" className="text-[10px] text-indigo-600 font-bold hover:underline">Forgot Password?</button>
                                        </div>
                                        <input
                                            type="password"
                                            className="w-full bg-white/50 border border-slate-200 rounded-xl p-3 text-sm focus:ring-2 focus:ring-indigo-500 transition-all outline-none"
                                            placeholder="••••••••"
                                            value={authForm.password}
                                            onChange={e => setAuthForm({ ...authForm, password: e.target.value })}
                                            required
                                        />
                                    </div>
                                    <button
                                        type="submit"
                                        disabled={loading}
                                        className="w-full bg-indigo-600 text-white rounded-xl py-4 font-bold shadow-xl hover:bg-indigo-700 transition-all"
                                    >
                                        {loading ? 'Processing...' : 'Sign In'}
                                    </button>
                                </form>
                                <div className="text-center mt-6">
                                    <button
                                        onClick={() => setView('signup')}
                                        className="text-indigo-600 font-semibold hover:underline"
                                    >
                                        Don't have an account? Sign Up
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {view === 'signup' && (
                        <div className="max-w-md mx-auto pt-10 pb-10 px-4">
                            <div className="glass-card rounded-3xl p-8 shadow-2xl">
                                <div className="text-center mb-8">
                                    <div className="w-16 h-16 bg-indigo-600 rounded-2xl flex items-center justify-center shadow-lg shadow-indigo-200 mx-auto mb-4">
                                        <span className="text-3xl">👤</span>
                                    </div>
                                    <h2 className="text-3xl font-bold text-slate-900">Get Started</h2>
                                    <p className="text-slate-500 mt-2 font-medium">LendSmart AI Predictive Engine</p>
                                </div>
                                <form onSubmit={(e) => handleAuth(e, 'signup')} className="space-y-4">
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="space-y-1">
                                            <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">First Name</label>
                                            <input
                                                type="text"
                                                className="w-full bg-white/50 border border-slate-200 rounded-xl p-3 text-sm focus:ring-2 focus:ring-indigo-500 transition-all outline-none"
                                                placeholder="John"
                                                value={authForm.firstName}
                                                onChange={e => setAuthForm({ ...authForm, firstName: e.target.value })}
                                                required
                                            />
                                        </div>
                                        <div className="space-y-1">
                                            <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Last Name</label>
                                            <input
                                                type="text"
                                                className="w-full bg-white/50 border border-slate-200 rounded-xl p-3 text-sm focus:ring-2 focus:ring-indigo-500 transition-all outline-none"
                                                placeholder="Doe"
                                                value={authForm.lastName}
                                                onChange={e => setAuthForm({ ...authForm, lastName: e.target.value })}
                                                required
                                            />
                                        </div>
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Mobile Number</label>
                                        <input
                                            type="tel"
                                            className="w-full bg-white/50 border border-slate-200 rounded-xl p-3 text-sm focus:ring-2 focus:ring-indigo-500 transition-all outline-none"
                                            placeholder="+91 98765 43210"
                                            value={authForm.mobile}
                                            onChange={e => setAuthForm({ ...authForm, mobile: e.target.value })}
                                            required
                                        />
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Email Address</label>
                                        <input
                                            type="email"
                                            className="w-full bg-white/50 border border-slate-200 rounded-xl p-3 text-sm focus:ring-2 focus:ring-indigo-500 transition-all outline-none"
                                            placeholder="name@example.com"
                                            value={authForm.email}
                                            onChange={e => setAuthForm({ ...authForm, email: e.target.value })}
                                            required
                                        />
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Password</label>
                                        <input
                                            type="password"
                                            className="w-full bg-white/50 border border-slate-200 rounded-xl p-3 text-sm focus:ring-2 focus:ring-indigo-500 transition-all outline-none"
                                            placeholder="••••••••"
                                            value={authForm.password}
                                            onChange={e => setAuthForm({ ...authForm, password: e.target.value })}
                                            required
                                        />
                                    </div>
                                    <button
                                        type="button"
                                        onClick={triggerOTP}
                                        disabled={loading}
                                        className="w-full bg-slate-100 text-slate-600 rounded-xl py-3 text-sm font-bold border border-slate-200 hover:bg-slate-200 transition-all flex items-center justify-center space-x-2"
                                    >
                                        <span>Send OTP to Email</span>
                                        <span className="text-xs">📨</span>
                                    </button>
                                    <button
                                        type="submit"
                                        disabled={loading}
                                        className="w-full bg-indigo-600 text-white rounded-xl py-4 font-bold shadow-xl hover:bg-indigo-700 transition-all"
                                    >
                                        {loading ? 'Processing...' : 'Create Account'}
                                    </button>
                                </form>
                                <div className="text-center mt-6">
                                    <button
                                        onClick={() => setView('login')}
                                        className="text-indigo-600 font-semibold hover:underline"
                                    >
                                        Already have an account? Login
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {view === 'main' && (
                        <div className="max-w-6xl mx-auto px-4 py-8 perspective-container">
                            <nav className="flex justify-between items-center mb-12">
                                <div className="flex items-center space-x-2">
                                    <div className="w-10 h-10 bg-indigo-600 rounded-lg flex items-center justify-center shadow-lg">
                                        <span className="text-xl">💎</span>
                                    </div>
                                    <span className="font-bold text-xl text-slate-800">LendSmart AI</span>
                                </div>
                                <div className="flex items-center space-x-4">
                                    <span className="text-slate-500 text-sm font-medium hidden md:block">Active: {user}</span>
                                    <button
                                        onClick={handleLogout}
                                        className="px-4 py-2 text-red-500 font-bold text-sm bg-red-50 rounded-lg hover:bg-red-100 transition-all"
                                    >
                                        Sign Out
                                    </button>
                                </div>
                            </nav>

                            <header className="text-center mb-16 floating">
                                <h1 className="text-4xl font-extrabold text-slate-900 tracking-tight">
                                    Predictive Financial <span className="text-indigo-600">Intelligence</span>
                                </h1>
                                <p className="text-slate-500 text-lg max-w-2xl mx-auto font-medium mt-4">
                                    Secure, neural-powered risk assessment for instant loan eligibility insights.
                                </p>
                            </header>

                            <main className="max-w-4xl mx-auto">
                                {!result ? (
                                    <div className="glass-card tilt-card rounded-3xl p-8 lg:p-12 shadow-2xl">
                                        <form onSubmit={handleSubmit} className="inner-3d space-y-8">
                                            <div className="grid md:grid-cols-2 gap-6">
                                                <div className="space-y-2">
                                                    <label className="text-xs font-bold text-slate-400 uppercase tracking-wider">Applicant Age</label>
                                                    <input
                                                        type="number"
                                                        className="w-full bg-white/50 border border-slate-200 rounded-xl p-4 focus:ring-2 focus:ring-indigo-500 transition-all outline-none"
                                                        placeholder="e.g. 28"
                                                        value={formData.age}
                                                        onChange={e => setFormData({ ...formData, age: e.target.value })}
                                                        required
                                                    />
                                                </div>
                                                <div className="space-y-2">
                                                    <label className="text-xs font-bold text-slate-400 uppercase tracking-wider">Annual Income (₹)</label>
                                                    <input
                                                        type="number"
                                                        className="w-full bg-white/50 border border-slate-200 rounded-xl p-4 focus:ring-2 focus:ring-indigo-500 transition-all outline-none"
                                                        placeholder="e.g. 800000"
                                                        value={formData.income}
                                                        onChange={e => setFormData({ ...formData, income: e.target.value })}
                                                        required
                                                    />
                                                </div>
                                                <div className="space-y-2">
                                                    <label className="text-xs font-bold text-slate-400 uppercase tracking-wider">Gender</label>
                                                    <select
                                                        className="w-full bg-white/50 border border-slate-200 rounded-xl p-4 focus:ring-2 focus:ring-indigo-500 outline-none"
                                                        value={formData.gender}
                                                        onChange={e => setFormData({ ...formData, gender: e.target.value })}
                                                    >
                                                        <option>Male</option>
                                                        <option>Female</option>
                                                    </select>
                                                </div>
                                                <div className="space-y-2">
                                                    <label className="text-xs font-bold text-slate-400 uppercase tracking-wider">Education</label>
                                                    <select
                                                        className="w-full bg-white/50 border border-slate-200 rounded-xl p-4 focus:ring-2 focus:ring-indigo-500 outline-none"
                                                        value={formData.education}
                                                        onChange={e => setFormData({ ...formData, education: e.target.value })}
                                                    >
                                                        <option>Graduate</option>
                                                        <option>Not Graduate</option>
                                                    </select>
                                                </div>
                                                <div className="space-y-2">
                                                    <label className="text-xs font-bold text-slate-400 uppercase tracking-wider">Employment Status</label>
                                                    <select
                                                        className="w-full bg-white/50 border border-slate-200 rounded-xl p-4 focus:ring-2 focus:ring-indigo-500 outline-none"
                                                        value={formData.self_employed}
                                                        onChange={e => setFormData({
                                                            ...formData,
                                                            self_employed: e.target.value,
                                                            salaried: e.target.value === 'No' ? 'Yes' : 'No'
                                                        })}
                                                    >
                                                        <option value="No">Corporate Professional (Salaried)</option>
                                                        <option value="Yes">Entrepreneur (Self-Employed)</option>
                                                    </select>
                                                </div>
                                                <div className="space-y-2">
                                                    <label className="text-xs font-bold text-slate-400 uppercase tracking-wider">Credit Health</label>
                                                    <div className="pt-4">
                                                        <input
                                                            type="range"
                                                            min="300" max="900"
                                                            className="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-indigo-600"
                                                            value={formData.cibil_score}
                                                            onChange={e => setFormData({ ...formData, cibil_score: e.target.value })}
                                                        />
                                                        <div className="flex justify-between mt-2 text-sm font-bold">
                                                            <span className="text-slate-400">300</span>
                                                            <span className="text-indigo-600 px-3 py-1 bg-indigo-50 rounded-full">{formData.cibil_score}</span>
                                                            <span className="text-slate-400">900</span>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>

                                            <button
                                                type="submit"
                                                disabled={loading}
                                                className="w-full bg-indigo-600 text-white rounded-2xl py-5 font-bold text-lg shadow-xl shadow-indigo-200 hover:bg-indigo-700 hover:-translate-y-1 transition-all flex items-center justify-center space-x-3"
                                            >
                                                {loading ? (
                                                    <div className="flex items-center space-x-2">
                                                        <div className="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
                                                        <span>Analyzing Risk Profile...</span>
                                                    </div>
                                                ) : (
                                                    <>
                                                        <span>Generate Prediction</span>
                                                        <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13 7l5 5m0 0l-5 5m5-5H6"></path></svg>
                                                    </>
                                                )}
                                            </button>
                                        </form>
                                    </div>
                                ) : (
                                    <div className="glass-card tilt-card-inverse rounded-3xl p-12 text-center shadow-2xl space-y-6">
                                        <div className="inner-3d">
                                            <div className="w-20 h-20 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-6 text-3xl">✓</div>
                                            <h2 className="text-2xl font-bold text-slate-800">Prediction Computed</h2>
                                            <p className="text-slate-500">Based on your financial data, the estimated value is:</p>
                                            <div className="text-6xl font-black text-indigo-600 my-8 tabular-nums tracking-tighter shimmer bg-clip-text">
                                                {formatCurrency(result)}
                                            </div>
                                            <button
                                                onClick={() => setResult(null)}
                                                className="inline-flex items-center space-x-2 text-slate-400 hover:text-indigo-600 font-semibold transition-colors"
                                            >
                                                <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                                                <span>Back to Calculator</span>
                                            </button>
                                        </div>
                                    </div>
                                )}
                            </main>

                            <footer className="mt-20 text-center text-slate-400 text-sm font-medium">
                                <p>&copy; 2024 LendSmart AI • Advanced Financial Intelligence Systems</p>
                            </footer>
                        </div>
                    )}

                    {/* OTP Verification Modal */}
                    {showOTPModal && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm">
                            <div className="glass-card rounded-3xl p-8 max-w-sm w-full shadow-2xl animate-in fade-in zoom-in duration-300">
                                <div className="text-center mb-6">
                                    <div className="w-16 h-16 bg-indigo-600 rounded-2xl flex items-center justify-center shadow-lg shadow-indigo-200 mx-auto mb-4">
                                        <span className="text-3xl">📨</span>
                                    </div>
                                    <h2 className="text-2xl font-bold text-slate-900">Verify OTP</h2>
                                    <p className="text-slate-500 text-sm mt-1 font-medium">Random code sent to:</p>
                                    <p className="text-indigo-600 font-bold text-sm">{authEmail}</p>
                                </div>
                                <form onSubmit={handleVerify} className="space-y-6">
                                    <div className="space-y-2">
                                        <input
                                            type="text"
                                            maxLength="6"
                                            className="w-full bg-slate-50 border border-slate-200 rounded-xl p-4 text-center text-3xl font-black tracking-[0.5em] focus:ring-2 focus:ring-indigo-500 transition-all outline-none"
                                            placeholder="000000"
                                            value={otp}
                                            onChange={e => setOtp(e.target.value)}
                                            required
                                            autoFocus
                                        />
                                    </div>
                                    <div className="flex flex-col space-y-3">
                                        <button
                                            type="submit"
                                            disabled={loading}
                                            className="w-full bg-indigo-600 text-white rounded-xl py-4 font-bold shadow-xl hover:bg-indigo-700 transition-all"
                                        >
                                            {loading ? 'Verifying...' : 'Complete Sign In'}
                                        </button>
                                        <button
                                            type="button"
                                            onClick={() => setShowOTPModal(false)}
                                            className="text-slate-400 text-sm font-semibold hover:text-slate-600 transition-colors"
                                        >
                                            Cancel
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
